
<!DOCTYPE html>
<html>

<head>

    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-4">
    Edit Product
</h1>

<form method="POST">

    <input
    type="text"
    name="name"
    value="{{ product.name }}"
    class="form-control mb-3">

    <input
    type="number"
    name="price"
    value="{{ product.price }}"
    class="form-control mb-3">

    <input
    type="text"
    name="category"
    value="{{ product.category }}"
    class="form-control mb-3">

    <input
    type="number"
    name="rating"
    value="{{ product.rating }}"
    class="form-control mb-3">

    <button
    type="submit"
    class="btn btn-success">

        Update Product

    </button>

</form>

</body>
</html>
