
<!DOCTYPE html>
<html>

<head>
    <title>Cart</title>
</head>

<body>

    <h1>Shopping Cart</h1>

    {% set total = 0 %}
    {% for item in cart %}

    <div>

        <h2>{{ item.name }}</h2>

        <p>Price: ₹{{ item.price }}</p>
        {% set total = total + (item.price * item.quantity) %}
        <p>Quantity :
            {{ item.quantity}}
        </p>
        <br>

<a href="/increase/{{ loop.index0 }}" class="btn btn-success">
    +
</a>

<a href="/decrease/{{ loop.index0 }}" class="btn btn-warning">
    -
</a>
        <a href="/remove/{{ loop.index0}}" class="btn btn-danger">Remove</a>

    </div>

    <hr>

    {% endfor %}

<h2>
    Total Price: ₹{{ total }}
</h2>
    <a href="/place-order" class="btn btn-success">Place Order</a>

</body>

</html>
