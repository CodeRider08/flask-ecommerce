
<!DOCTYPE html>
<html>

<head>

    <title>Product Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">



<h1 class="mb-4">
    {{ product.name }}
</h1>

<div class="card p-4">

    <img
    src="{{ url_for('static', filename='images/' + product.image) }}"
    class="img-fluid"
    width="300"
    alt="{{product.name}}">
</div>

    <h2 class="mt-3">
        {{ product.name }}
    </h2>

    <h3>
        ₹{{ product.price }}
    </h3>

    <p>
        High quality product available at ShopNova.
    </p>

    <a
    href="/add/{{ product.id }}"
    class="btn btn-primary">

        Add to Cart

    </a>
    <hr>

<h3>
    Reviews
</h3>

<form method="POST">

    <textarea
    name="comment"
    placeholder="Write your review"
    class="form-control mb-3"></textarea>

    <button
    type="submit"
    class="btn btn-primary">

        Submit Review

    </button>

</form>

<hr>

{% for review in reviews %}

<div class="card p-3 mb-3">

    <h5>
        {{ review.username }}
    </h5>

    <p>
        {{ review.comment }}
    </p>

</div>

{% endfor %}

    <br>

    <a herf="/"
    class="btn btn-secondary">Back to Home</a>

</div>

</body>
</html>
